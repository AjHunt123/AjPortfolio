## About Me

I'm a 3rd-year BSIT student at UC-Banilad with a growing passion for game development and interactive systems. I started coding at 19, fell in love with Unity at 20, and haven't stopped building since. I believe the best way to learn is by making — so I build, break, and rebuild constantly.

**What drives me:** Creating experiences that make people think, laugh, or feel challenged. Whether it's a tight shooter or a unpredictable dungeon crawler, I care about how the player *feels*.

🔍 **Currently seeking:** Internship or junior developer role starting mid-2025.

